name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - 'develop'
jobs:
  # CD: 빌드 및 ECR 업로드
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build and Push Image to AWS ECR Public Repo
        run: |
          aws ecr-public get-login-password --region ${{ secrets.AWS_PUBLIC_REPO_REGION }} | docker login --username AWS --password-stdin public.ecr.aws/${{ secrets.AWS_ACCOUNT_ID }}
          docker build -t ${{ secrets.DEV_ECR_REPO }}:latest .
          docker tag ${{ secrets.DEV_ECR_REPO }}:latest public.ecr.aws/${{ secrets.AWS_ACCOUNT_ID }}/${{ secrets.DEV_ECR_REPO }}:latest
          docker push public.ecr.aws/${{ secrets.AWS_ACCOUNT_ID }}/${{ secrets.DEV_ECR_REPO }}:latest

  # CD: EC2 배포
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ec2-user
          key: ${{ secrets.DEV_PEM_KEY }}
          script: |
            # Parameter Store에서 .env 생성
            aws ssm get-parameters-by-path \
              --path "/sopt/dev/" \
              --recursive \
              --with-decryption \
              --query "Parameters[*].[Name,Value]" \
              --output text \
              --region ap-northeast-2 | while read name value; do
                key=$(echo $name | awk -F'/' '{print $NF}')
                echo "${key}=${value}"
            done > /tmp/.env

            # 파라미터 로드 확인
            PARAM_COUNT=$(wc -l < /tmp/.env)
            echo "✅ ${PARAM_COUNT}개 파라미터 로드 완료"

            if [ "$PARAM_COUNT" -lt 5 ]; then
              echo "❌ 파라미터가 너무 적습니다. 배포를 중단합니다."
              rm -f /tmp/.env
              exit 1
            fi

            sudo docker stop spring-dev-server || true
            sudo docker rm spring-dev-server || true
            sudo docker image prune -a -f
            sudo docker pull public.ecr.aws/${{ secrets.AWS_ACCOUNT_ID }}/${{ secrets.DEV_ECR_REPO }}:latest
            sudo docker run --name spring-dev-server \
              --env-file /tmp/.env \
              -d -p 8086:8080 -t \
              public.ecr.aws/${{ secrets.AWS_ACCOUNT_ID }}/${{ secrets.DEV_ECR_REPO }}:latest

            # 임시 파일 삭제
            rm -f /tmp/.env
