name: Deploy Lambda Dev

on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - develop

jobs:
  deploy:
    name: Deploy to Lambda Dev
    runs-on: ubuntu-latest

    env:
      S3_BUCKET: sopt-org-lambda-deploy
      STACK_NAME: sopt-org-spring-dev
      AWS_REGION: ap-northeast-2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'
          cache: 'gradle'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-northeast-2

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Lambda JAR
        run: ./gradlew clean lambdaJar -x test -x sentryBundleSourcesJava

      - name: Upload JAR to S3
        run: |
          JAR_FILE=$(ls build/distributions/*-lambda.zip | head -1)
          TIMESTAMP=$(date +"%Y%m%d-%H%M%S")
          S3_KEY="lambda/${{ env.STACK_NAME }}-${TIMESTAMP}.zip"
          
          aws s3 cp "$JAR_FILE" "s3://${{ env.S3_BUCKET }}/${S3_KEY}"
          
          echo "S3_KEY=${S3_KEY}" >> $GITHUB_ENV
          echo "✅ S3 업로드 완료: s3://${{ env.S3_BUCKET }}/${S3_KEY}"

      - name: Install SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Fetch params from Parameter Store
        run: |
          get_param() {
            aws ssm get-parameter \
              --name "/sopt/lambda-dev/$1" \
              --with-decryption \
              --query "Parameter.Value" \
              --output text \
              --region ${{ env.AWS_REGION }}
          }

          echo "DB_HOST=$(get_param DB_HOST)" >> $GITHUB_ENV
          echo "DB_PORT=$(get_param DB_PORT)" >> $GITHUB_ENV
          echo "DB_DATABASE=$(get_param DB_DATABASE)" >> $GITHUB_ENV
          echo "DB_USERNAME=$(get_param DB_USERNAME)" >> $GITHUB_ENV
          echo "DB_PASSWORD=$(get_param DB_PASSWORD)" >> $GITHUB_ENV
          echo "LAMBDA_ACCESS_KEY=$(get_param AWS_ACCESS_KEY_ID)" >> $GITHUB_ENV
          echo "LAMBDA_SECRET_KEY=$(get_param AWS_SECRET_ACCESS_KEY)" >> $GITHUB_ENV
          echo "BUCKET_NAME=$(get_param BUCKET_NAME)" >> $GITHUB_ENV
          echo "PLAYGROUND_API_URL=$(get_param PLAYGROUND_API_URL)" >> $GITHUB_ENV
          echo "PLAYGROUND_API_TOKEN=$(get_param PLAYGROUND_API_URL_JWT_TOKEN)" >> $GITHUB_ENV
          echo "CREW_API_URL=$(get_param CREW_API_URL)" >> $GITHUB_ENV
          echo "CREW_API_TOKEN=$(get_param CREW_API_URL_JWT_TOKEN)" >> $GITHUB_ENV
          echo "AUTH_API_KEY=$(get_param AUTH_API_KEY)" >> $GITHUB_ENV
          echo "OUR_SERVICE_NAME=$(get_param OUR_SERVICE_NAME)" >> $GITHUB_ENV
          echo "ACCESS_TOKEN_SECRET=$(get_param ACCESS_TOKEN_SECRET)" >> $GITHUB_ENV
          echo "REFRESH_TOKEN_SECRET=$(get_param REFRESH_TOKEN_SECRET)" >> $GITHUB_ENV
          echo "ADMIN_TOKEN_SECRET=$(get_param ADMIN_TOKEN_SECRET)" >> $GITHUB_ENV
          echo "OFFICIAL_API_KEY=$(get_param OFFICIAL_API_KEY)" >> $GITHUB_ENV
          echo "SENTRY_DSN=$(get_param DEV_SENTRY_DSN)" >> $GITHUB_ENV

          echo "✅ Parameter Store에서 19개 파라미터 로드 완료"

      - name: Create parameter file
        run: |
          cat > params.json << EOF
          {
            "S3Bucket": "${{ env.S3_BUCKET }}",
            "S3Key": "${{ env.S3_KEY }}",
            "SpringProfile": "lambda-dev",
            "DbHost": "${{ env.DB_HOST }}",
            "DbPort": "${{ env.DB_PORT }}",
            "DbDatabase": "${{ env.DB_DATABASE }}",
            "DbUsername": "${{ env.DB_USERNAME }}",
            "DbPassword": "${{ env.DB_PASSWORD }}",
            "AwsAccessKeyId": "${{ env.LAMBDA_ACCESS_KEY }}",
            "AwsSecretAccessKey": "${{ env.LAMBDA_SECRET_KEY }}",
            "BucketName": "${{ env.BUCKET_NAME }}",
            "PlaygroundApiUrl": "${{ env.PLAYGROUND_API_URL }}",
            "PlaygroundApiToken": "${{ env.PLAYGROUND_API_TOKEN }}",
            "CrewApiUrl": "${{ env.CREW_API_URL }}",
            "CrewApiToken": "${{ env.CREW_API_TOKEN }}",
            "AuthApiKey": "${{ env.AUTH_API_KEY }}",
            "OurServiceName": "${{ env.OUR_SERVICE_NAME }}",
            "AccessTokenSecret": "${{ env.ACCESS_TOKEN_SECRET }}",
            "RefreshTokenSecret": "${{ env.REFRESH_TOKEN_SECRET }}",
            "AdminTokenSecret": "${{ env.ADMIN_TOKEN_SECRET }}",
            "OfficialApiKey": "${{ env.OFFICIAL_API_KEY }}",
            "SentryDsn": "${{ env.SENTRY_DSN }}"
          }
          EOF
          
          echo "✅ 파라미터 파일 생성 완료"

      - name: Deploy with SAM
        working-directory: ./lambda
        run: |
          PARAMS=$(cat ../params.json | jq -r 'to_entries | map("\(.key)=\(.value)") | join(" ")')
          
          sam deploy \
            --template-file template-dev.yaml \
            --stack-name ${{ env.STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides "$PARAMS"

      - name: Cleanup parameter file
        if: always()
        run: rm -f params.json

      - name: Get API Endpoint
        run: |
          API_ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" \
            --output text \
            --region ${{ env.AWS_REGION }})
          
          echo "============================================"
          echo "🌐 API Endpoint: ${API_ENDPOINT}"
          echo "============================================"
          echo ""
          echo "테스트 명령어:"
          echo "  curl -X GET ${API_ENDPOINT}/v2/homepage"
          echo "  curl -X GET ${API_ENDPOINT}/v2/projects"
